<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>全社カレンダー</title>
  <style>
    :root {
      --c-red: #e60000;
      --c-black: #111111;
      --c-grid-line: #cbd5e1;
      --c-today: #3b82f6;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body,
    html {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background-color: #222;
      user-select: none;
      -webkit-touch-callout: none;
    }

    #app {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
    }

    /* ヘッダー */
    .header {
      flex: 0 0 auto;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      padding: 1dvh 2vw;
      background-color: #1a1a1a;
      color: #fff;
      min-height: 5dvh;
      gap: 10px;
    }

    .title-area {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .title {
      font-size: max(12px, 2dvh);
      font-weight: bold;
      white-space: nowrap;
    }

    .work-days-info {
      font-size: 0.8em;
      font-weight: normal;
      color: #9ca3af;
      margin-left: 4px;
    }

    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .year-selector {
      background-color: #333;
      color: #fff;
      border: 1px solid #555;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: max(11px, 1.6dvh);
      cursor: pointer;
      outline: none;
    }

    .btn {
      background-color: #444;
      color: #fff;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: max(10px, 1.5dvh);
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s;
    }

    .btn:active {
      background-color: #666;
    }

    .btn-blue {
      background-color: var(--c-today);
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 2vw;
      font-size: max(10px, 1.4dvh);
      margin-top: 2px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }

    .box-icon {
      display: inline-block;
      width: 1em;
      height: 1em;
      border: 2px solid var(--c-red);
    }

    .circle-icon {
      display: inline-block;
      width: 1em;
      height: 1em;
      border: 2px solid #fff;
      border-radius: 50%;
    }

    /* カレンダー全体 */
    .calendar-container {
      flex: 1 1 auto;
      display: grid;
      gap: 2px;
      padding: 2px;
      background-color: #000;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(4, 1fr);
    }

    @media (orientation: landscape) {
      .calendar-container {
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: repeat(3, 1fr);
      }
    }

    .month-card {
      display: flex;
      flex-direction: column;
      background-color: #fff;
      overflow: hidden;
      cursor: pointer;
      position: relative;
    }



    .month-header {
      flex: 0 0 auto;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 4px;
      background-color: #e2e8f0;
      font-weight: bold;
      font-size: max(10px, 1.8dvh);
      padding: 2px 0;
    }

    .month-header.rec-month {
      background-color: #bfdbfe;
      color: #1e3a8a;
    }

    .badge {
      font-size: 0.7em;
      background-color: #1d4ed8;
      color: #fff;
      padding: 1px 4px;
      border-radius: 2px;
    }

    .weekdays {
      flex: 0 0 auto;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      background-color: #f8fafc;
      border-bottom: 1px solid var(--c-grid-line);
    }

    .weekday {
      text-align: center;
      font-size: max(8px, 1.2dvh);
      font-weight: bold;
      padding: 2px 0;
    }

    .weekday.red {
      color: var(--c-red);
    }

    .days-grid {
      flex: 1 1 auto;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      grid-template-rows: repeat(6, 1fr);
      gap: 1px;
      background-color: var(--c-grid-line);
    }

    .day-cell {
      background-color: #fff;
      container-type: size;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    .day-cell:active {
      background-color: #fef08a;
    }

    .day-cell.empty {
      background-color: #f1f5f9;
      pointer-events: none;
    }

    .day-cell.is-today {
      background-color: #eff6ff;
    }

    .day-cell.is-today::before {
      content: "";
      position: absolute;
      inset: 2px;
      border: max(2px, 3cqmin) solid var(--c-today);
      border-radius: 4px;
      pointer-events: none;
      z-index: 3;
    }

    /* ズーム専用スタイル */
    #zoom-modal .day-cell {
      display: grid;
      grid-template-rows: 1fr max(24px, 3.5dvh);
      padding-top: 2px;
    }

    .num-wrapper {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
    }

    #zoom-modal .num-wrapper {
      grid-row: 1 / 2;
    }

    .day-num {
      font-size: 65cqmin;
      font-weight: 900;
      line-height: 1;
      z-index: 2;
      pointer-events: none;
    }

    #zoom-modal .day-num {
      font-size: 50cqmin;
    }

    .day-num.red {
      color: var(--c-red);
    }

    .mark-paid {
      position: absolute;
      border: max(1.5px, 2cqmin) solid var(--c-red);
      z-index: 1;
      width: 80cqmin;
      height: 80cqmin;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .mark-rec {
      position: absolute;
      border: max(1.5px, 2cqmin) solid var(--c-black);
      border-radius: 50%;
      z-index: 1;
      width: 80cqmin;
      height: 80cqmin;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .mark-memorial {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 35cqmin;
      height: 35cqmin;
      background-color: var(--c-red);
      clip-path: polygon(100% 0, 100% 100%, 0 100%);
      z-index: 1;
    }

    .mark-substitute {
      position: absolute;
      top: 0;
      left: 0;
      width: 35cqmin;
      height: 35cqmin;
      background-color: var(--c-red);
      clip-path: polygon(0 0, 100% 0, 0 100%);
      z-index: 1;
    }

    .day-label {
      display: none;
    }

    #zoom-modal .mark-paid,
    #zoom-modal .mark-rec {
      width: 68cqmin;
      height: 68cqmin;
    }

    #zoom-modal .day-label {
      display: flex;
      grid-row: 2 / 3;
      width: 100%;
      height: 100%;
      justify-content: center;
      align-items: flex-start;
      text-align: center;
      font-size: max(11px, 1.6dvh);
      font-weight: bold;
      padding: 0 2px;
      line-height: 1.1;
      word-break: break-word;
    }

    #zoom-modal .day-label.red-label {
      color: var(--c-red);
    }

    /* 👇 ズーム時のヘッダーや曜日を当初のサイズ指定（3.5dvh, 2.5dvh）に戻しました */
    #zoom-modal .month-header {
      font-size: min(3.5dvh, 4.2vw);
      padding: 1.5dvh 2vw;
      justify-content: space-between;
    }

    .zoom-title-text {
      display: flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }

    #zoom-modal .badge {
      font-size: 0.55em;
      padding: 1px 3px;
    }

    .month-nav-btn {
      background: rgba(0, 0, 0, 0.05);
      border: none;
      font-size: 3dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 50%;
      width: 4.5dvh;
      height: 4.5dvh;
      cursor: pointer;
      color: #333;
      transition: background 0.2s;
    }

    .month-nav-btn:active {
      background: rgba(0, 0, 0, 0.15);
    }

    #zoom-modal .weekday {
      font-size: 2.5dvh;
      padding: 1dvh 0;
    }

    /* モーダル共通 */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100dvh;
      background-color: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(4px);
      z-index: 2000;
      display: none;
      flex-direction: column;
      padding: 3dvh 3vw;
      gap: 1.5dvh;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .modal.show {
      display: flex;
      opacity: 1;
    }

    .modal-content {
      background-color: #fff;
      flex: 1;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .modal-top-bar {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      width: 100%;
      flex-shrink: 0;
    }

    .modal-close-btn {
      font-size: max(14px, 2dvh);
      padding: 6px 20px;
      border-radius: 20px;
    }

    .modal-today-btn {
      font-size: max(14px, 2dvh);
      padding: 6px 20px;
      border-radius: 20px;
    }

    /* 👇 休日リスト用レイアウトの崩れ修正 */
    .list-view {
      padding: 20px;
      overflow-y: auto;
      color: #333;
    }

    .list-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #eee;
      gap: 10px;
    }

    /* 左側（日付・連休表示） */
    .list-date-area {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex-shrink: 0;
    }

    .list-date {
      font-weight: bold;
      color: var(--c-black);
    }

    .list-range {
      font-size: 0.85em;
      color: #666;
    }

    /* 右側（休日名・バッジ） */
    .list-name-area {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      text-align: right;
    }

    .list-name {
      color: var(--c-red);
      font-weight: bold;
      word-break: break-word;
    }

    .list-badges {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .badge-paid,
    .badge-rec {
      font-size: 0.75em;
      padding: 2px 6px;
      border-radius: 4px;
      white-space: nowrap;
      font-weight: normal;
    }

    .badge-paid {
      background-color: #fee2e2;
      color: #b91c1c;
    }

    .badge-rec {
      background-color: #f3f4f6;
      color: #4b5563;
    }

    .toast {
      position: fixed;
      bottom: 2dvh;
      left: 50%;
      transform: translate(-50%, 20px);
      background-color: rgba(30, 30, 30, 0.95);
      color: #fff;
      padding: 1.5dvh 5vw;
      border-radius: 50px;
      font-size: max(14px, 2dvh);
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s;
      z-index: 3000;
    }

    .toast.show {
      transform: translate(-50%, 0);
      opacity: 1;
    }
  </style>
</head>

<body>

  <div id="app">
    <header class="header">
      <div class="title-area">
        <select id="year-selector" class="year-selector" onchange="changeYear(this.value)"></select>
        <div class="title" id="page-title">全社カレンダー</div>
      </div>
      <div class="controls">
        <button class="btn btn-blue" onclick="goToday()">今日</button>
        <button class="btn" onclick="showHolidayList()">休日一覧</button>
      </div>
      <div class="legend">
        <div class="legend-item"><span style="color:var(--c-red)">■</span>休</div>
        <div class="legend-item"><span class="box-icon"></span>年休</div>
        <div class="legend-item"><span class="circle-icon"></span>推奨</div>
        <div class="legend-item"><span
            style="display:inline-block; width:1em; height:1em; background:var(--c-red); clip-path:polygon(100% 0, 100% 100%, 0 100%); vertical-align:middle;"></span>記念
        </div>
        <div class="legend-item"><span
            style="display:inline-block; width:1em; height:1em; background:var(--c-red); clip-path:polygon(0 0, 100% 0, 0 100%); vertical-align:middle;"></span>代替
        </div>
      </div>
    </header>

    <main id="calendar-container" class="calendar-container"></main>
  </div>

  <div id="zoom-modal" class="modal">
    <div class="modal-top-bar">
      <button class="btn btn-blue modal-today-btn" onclick="goToday()">今日へ</button>
      <button class="btn modal-close-btn" onclick="closeModal('zoom-modal')">× 閉じる</button>
    </div>
    <div id="zoom-container" class="modal-content month-card"></div>
  </div>

  <div id="list-modal" class="modal">
    <div class="modal-top-bar">
      <button class="btn modal-close-btn" onclick="closeModal('list-modal')">× 閉じる</button>
    </div>
    <div class="modal-content list-view" id="holiday-list-container"></div>
  </div>

  <div id="info-toast" class="toast"></div>

  <script>
    const weekNames = ['日', '月', '火', '水', '木', '金', '土'];
    let calendarData = null;
    let monthConfigs = [];
    let targetYear = 2026;
    let availableYears = [];
    let currentZoomIndex = 0;
    let isFetchingYear = false;

    let toastTimer;
    function showToast(e, dateStr, infoText) {
      if (e) e.stopPropagation();
      const toast = document.getElementById('info-toast');
      toast.innerHTML = `<span>${dateStr}</span> <span>${infoText}</span>`;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { toast.classList.remove('show'); }, 2500);
    }

    function closeModal(id) { document.getElementById(id).classList.remove('show'); }

    async function goToday() {
      const today = new Date();
      const y = today.getFullYear();
      const m = today.getMonth() + 1;
      const fiscalYear = m >= 4 ? y : y - 1;

      if (targetYear !== fiscalYear) {
        await fetchAndRenderYear(fiscalYear);
      }

      const index = m >= 4 ? m - 4 : m + 8;
      openZoom(index);

      const dateStr = `${m}月${today.getDate()}日`;
      showToast(null, dateStr, "本日に移動しました");
    }

    // 休日一覧表示 (HTML生成部分の崩れ修正)
    function showHolidayList() {
      const container = document.getElementById('holiday-list-container');
      let html = `<h2>${targetYear}年度 休日・連休一覧</h2>`;

      let allHolidays = [];
      monthConfigs.forEach(conf => {
        const daysInMonth = new Date(conf.y, conf.m, 0).getDate();
        for (let d = 1; d <= daysInMonth; d++) {
          const key = `${conf.m}-${d}`;
          const spType = calendarData.specials[key];
          const isHoliday = calendarData.holidays[conf.m]?.includes(d);

          if (isHoliday || spType) {
            const w = new Date(conf.y, conf.m - 1, d).getDay();
            const isNormalWeekend = (w === 0 || w === 6);

            let name = calendarData.dayDetails[key];
            if (!name) {
              if (spType === 'paid') name = "年休充当日";
              else if (spType === 'rec') name = "年休推奨日";
              else if (spType === 'substitute') name = "代替休暇";
              else if (spType === 'memorial') name = "特別日";
              else if (spType === 'yearend') name = "年末休暇";
              else if (spType === 'newyear') name = "年始休暇";
              else name = isNormalWeekend ? (w === 0 ? "日曜日" : "土曜日") : "祝日";
            }

            allHolidays.push({
              date: new Date(conf.y, conf.m - 1, d),
              name: name,
              m: conf.m,
              d: d,
              spType: spType,
              isNormalWeekend: isNormalWeekend && !calendarData.dayDetails[key] && !spType
            });
          }
        }
      });

      // 連休をグループ化
      let ranges = [];
      if (allHolidays.length > 0) {
        let currentRange = [allHolidays[0]];
        for (let i = 1; i <= allHolidays.length; i++) {
          let curr = allHolidays[i];
          let prev = allHolidays[i - 1];
          if (curr && (curr.date - prev.date === 86400000)) {
            currentRange.push(curr);
          } else {
            ranges.push({ start: currentRange[0], end: currentRange[currentRange.length - 1], count: currentRange.length, days: currentRange });
            if (curr) currentRange = [curr];
          }
        }
      }

      ranges.forEach(r => {
        let hasPaid = false;
        let hasRec = false;
        let isAllNormalWeekends = true;
        let specialNames = [];

        r.days.forEach(day => {
          if (day.spType === 'paid') hasPaid = true;
          if (day.spType === 'rec') hasRec = true;
          if (!day.isNormalWeekend) isAllNormalWeekends = false;
          if (day.name !== "土曜日" && day.name !== "日曜日" && day.name !== "祝日" && day.name !== "年休充当日" && day.name !== "年休推奨日" && day.name !== "代替休暇") {
            if (!specialNames.includes(day.name)) specialNames.push(day.name);
          }
        });

        if (r.count < 3 && isAllNormalWeekends) return;

        const dateText = r.count > 1 ? `${r.start.m}/${r.start.d} ～ ${r.end.m}/${r.end.d}` : `${r.start.m}/${r.start.d}`;
        const countText = r.count > 1 ? `<span class="list-range">(${r.count}連休)</span>` : "";

        let nameText = "";
        let badgesHtml = "";

        if (hasPaid) badgesHtml += `<span class="badge-paid">年休充当日</span>`;
        if (hasRec) badgesHtml += `<span class="badge-rec">推奨日</span>`;

        if (r.count >= 3) {
          nameText = specialNames.length > 0 ? specialNames.join(' / ') : "大型連休";
        } else {
          nameText = specialNames.join(' / ') || "祝日";
          if (nameText === "祝日" && (hasPaid || hasRec)) nameText = "";
        }

        // 崩れ防止のためFlexBoxを活用した構造に変更
        html += `
        <div class="list-item">
          <div class="list-date-area">
            <span class="list-date">${dateText}</span>
            ${countText}
          </div>
          <div class="list-name-area">
            ${nameText ? `<span class="list-name">${nameText}</span>` : ''}
            ${badgesHtml ? `<div class="list-badges">${badgesHtml}</div>` : ''}
          </div>
        </div>`;
      });

      container.innerHTML = html;
      document.getElementById('list-modal').classList.add('show');
    }

    // カレンダー生成
    function generateMonthHTML(year, month, isRec, isZoom = false) {
      const daysInMonth = new Date(year, month, 0).getDate();
      const firstDay = new Date(year, month - 1, 1).getDay();
      const holidaysCount = calendarData.holidays[month]?.length || 0;
      const workDaysCount = daysInMonth - holidaysCount;

      const headerClass = isRec ? 'month-header rec-month' : 'month-header';
      const badgeHtml = isRec ? '<span class="badge">推奨</span>' : '';

      let titleHtml = '';
      if (isZoom) {
        titleHtml = `
          <button class="month-nav-btn" onclick="event.stopPropagation(); handleMonthSwipe(100)">&#10094;</button>
          <div class="zoom-title-text">
            <span>${year}年${month}月</span><span class="work-days-info">(労働日数: ${workDaysCount}日)</span>${badgeHtml}
          </div>
          <button class="month-nav-btn" onclick="event.stopPropagation(); handleMonthSwipe(-100)">&#10095;</button>
        `;
      } else {
        titleHtml = `<span>${month}月</span>${badgeHtml}`;
      }

      let html = `<div class="${headerClass}">${titleHtml}</div>
        <div class="weekdays"><div class="weekday red">日</div><div class="weekday">月</div><div class="weekday">火</div><div class="weekday">水</div><div class="weekday">木</div><div class="weekday">金</div><div class="weekday red">土</div></div>
        <div class="days-grid">`;

      let cellCount = 0;
      for (let i = 0; i < firstDay; i++) { html += `<div class="day-cell empty"></div>`; cellCount++; }

      const today = new Date();
      for (let day = 1; day <= daysInMonth; day++) {
        const key = `${month}-${day}`;
        const spType = calendarData.specials[key];
        const isToday = (year === today.getFullYear() && month === today.getMonth() + 1 && day === today.getDate());
        const w = new Date(year, month - 1, day).getDay();
        const isHoliday = calendarData.holidays[month]?.includes(day);
        let infoText = calendarData.dayDetails[key];
        if (!infoText) {
          if (spType === 'paid') infoText = "年休充当日";
          else if (spType === 'rec') infoText = "年休推奨日";
          else if (spType === 'substitute') infoText = "代替休暇";
          else if (spType === 'memorial') infoText = "特別日";
          else if (spType === 'yearend') infoText = "年末休暇";
          else if (spType === 'newyear') infoText = "年始休暇";
          else infoText = isHoliday ? (w === 0 ? "日曜日" : w === 6 ? "土曜日" : "祝日") : "平日";
        }

        let cellMark = '', numMark = '', textColor = (isHoliday || spType === 'substitute' || spType === 'yearend' || spType === 'newyear') ? 'red' : 'black';
        let isRedLabel = (textColor === 'red');

        if (spType === 'paid') {
          numMark = `<div class="mark-paid"></div>`;
          textColor = 'black';
          isRedLabel = false;
        }
        else if (spType === 'rec') {
          numMark = `<div class="mark-rec"></div>`;
          textColor = 'black';
          isRedLabel = false;
        }
        else if (spType === 'memorial') { cellMark = `<div class="mark-memorial"></div>`; textColor = 'red'; isRedLabel = true; }
        else if (spType === 'substitute') { cellMark = `<div class="mark-substitute"></div>`; textColor = 'red'; isRedLabel = true; }
        else if (spType === 'yearend' || spType === 'newyear') { textColor = 'red'; isRedLabel = true; }

        let labelHtml = isZoom ? `<div class="day-label ${isRedLabel ? 'red-label' : ''}">${(infoText !== "平日" && infoText !== "日曜日" && infoText !== "土曜日") ? infoText : ''}</div>` : '';

        html += `<div class="day-cell ${isToday ? 'is-today' : ''}" onclick="showToast(event, '${month}/${day}', '${infoText}')">
          ${cellMark}<div class="num-wrapper">${numMark}<span class="day-num ${textColor}">${day}</span></div>${labelHtml}
        </div>`;
        cellCount++;
      }
      while (cellCount < 42) { html += `<div class="day-cell empty"></div>`; cellCount++; }
      return html + `</div>`;
    }

    function openZoom(index) {
      currentZoomIndex = index;
      const conf = monthConfigs[index];
      document.getElementById('zoom-container').innerHTML = generateMonthHTML(conf.y, conf.m, conf.rec, true);
      document.getElementById('zoom-modal').classList.add('show');
    }

    async function changeYear(y) { await fetchAndRenderYear(parseInt(y)); }

    async function fetchAndRenderYear(year) {
      try {
        const res = await fetch(`data-${year}.json`);
        calendarData = await res.json();
        targetYear = calendarData.fiscalYear || year;
        monthConfigs = [];
        for (let i = 4; i <= 12; i++) monthConfigs.push({ m: i, y: year, rec: calendarData.recMonths.includes(i) });
        for (let i = 1; i <= 3; i++) monthConfigs.push({ m: i, y: year + 1, rec: calendarData.recMonths.includes(i) });

        let annualDays = 0;
        monthConfigs.forEach(c => annualDays += (new Date(c.y, c.m, 0).getDate() - (calendarData.holidays[c.m]?.length || 0)));

        document.getElementById('page-title').innerHTML = `全社カレンダー <span class="work-days-info">(年間: ${annualDays}日)</span>`;
        document.getElementById('year-selector').value = year;

        const container = document.getElementById('calendar-container');
        container.innerHTML = '';
        monthConfigs.forEach((c, i) => {
          const card = document.createElement('div');
          card.className = 'month-card';
          card.onclick = () => openZoom(i);
          card.innerHTML = generateMonthHTML(c.y, c.m, c.rec);
          container.appendChild(card);
        });
        return true;
      } catch (e) { return false; }
    }

    // スワイプ・月移動処理
    let startX = 0;
    let isDragging = false;
    const zoomModal = document.getElementById('zoom-modal');

    async function handleMonthSwipe(diff) {
      if (Math.abs(diff) < 50 || isFetchingYear) return;
      if (diff < 0) {
        if (currentZoomIndex < 11) openZoom(currentZoomIndex + 1);
        else if (availableYears.includes(targetYear + 1)) {
          isFetchingYear = true; await fetchAndRenderYear(targetYear + 1); openZoom(0); isFetchingYear = false;
        }
      } else {
        if (currentZoomIndex > 0) openZoom(currentZoomIndex - 1);
        else if (availableYears.includes(targetYear - 1)) {
          isFetchingYear = true; await fetchAndRenderYear(targetYear - 1); openZoom(11); isFetchingYear = false;
        }
      }
    }

    // タッチ対応（スマホ）
    zoomModal.addEventListener('touchstart', e => startX = e.changedTouches[0].screenX, { passive: true });
    zoomModal.addEventListener('touchend', e => handleMonthSwipe(e.changedTouches[0].screenX - startX), { passive: true });

    // マウスドラッグ対応（PC）
    zoomModal.addEventListener('mousedown', e => { startX = e.screenX; isDragging = true; });
    window.addEventListener('mouseup', e => {
      if (!isDragging) return;
      isDragging = false;
      handleMonthSwipe(e.screenX - startX);
    });

    // キーボードの矢印キー対応（PC）
    document.addEventListener('keydown', e => {
      if (!zoomModal.classList.contains('show') || isFetchingYear) return;
      if (e.key === 'ArrowLeft') handleMonthSwipe(100);
      else if (e.key === 'ArrowRight') handleMonthSwipe(-100);
    });

    async function init() {
      try {
        const res = await fetch('available-years.json');
        availableYears = await res.json();
        const today = new Date();
        const currentFY = today.getMonth() + 1 >= 4 ? today.getFullYear() : today.getFullYear() - 1;
        const startYear = availableYears.includes(currentFY) ? currentFY : availableYears[0];

        const sel = document.getElementById('year-selector');
        availableYears.forEach(y => {
          const opt = document.createElement('option');
          opt.value = y; opt.textContent = `${y}年度`;
          sel.appendChild(opt);
        });
        await fetchAndRenderYear(startYear);
      } catch (e) { }
    }
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>

</html>
